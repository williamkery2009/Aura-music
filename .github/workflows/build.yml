name: Aura — Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Toolchain
      # ─────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      # ─────────────────────────────────────────
      # 3. Locate project — use aura-android/
      #    folder directly (already extracted
      #    in repo). Zip is ignored here.
      # ─────────────────────────────────────────
      - name: Locate project directory
        run: |
          if [ -d "aura-android" ]; then
            echo "PROJECT=$GITHUB_WORKSPACE/aura-android" >> $GITHUB_ENV
          else
            unzip -q -o aura-android-v25.zip -d _extracted
            DIR=$(find _extracted -maxdepth 2 -name "package.json" | head -1 | xargs dirname)
            echo "PROJECT=$(realpath $DIR)" >> $GITHUB_ENV
          fi

      - name: Confirm project path
        run: |
          echo "Project: $PROJECT"
          ls "$PROJECT"

      # ─────────────────────────────────────────
      # 4. Configure Android SDK path
      # ─────────────────────────────────────────
      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > "$PROJECT/android/local.properties"

      # ─────────────────────────────────────────
      # 5. Install dependencies
      # ─────────────────────────────────────────
      - name: Install npm dependencies
        working-directory: ${{ env.PROJECT }}
        run: npm install --prefer-offline --no-audit --no-fund

      # ─────────────────────────────────────────
      # 6. Build web layer
      # ─────────────────────────────────────────
      - name: Inject native bridge into index.html
        working-directory: ${{ env.PROJECT }}
        run: node scripts/build.js

      - name: Capacitor sync to Android
        working-directory: ${{ env.PROJECT }}
        run: npx cap sync android --inline

      # ─────────────────────────────────────────
      # 7. Gradle cache
      # ─────────────────────────────────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ─────────────────────────────────────────
      # 8. Build APK
      # ─────────────────────────────────────────
      - name: Build debug APK
        working-directory: ${{ env.PROJECT }}/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            --no-daemon \
            --parallel \
            --build-cache \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=512m"

      # ─────────────────────────────────────────
      # 9. Upload artifact
      # ─────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aura-v25-debug
          path: ${{ env.PROJECT }}/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      # ─────────────────────────────────────────
      # 10. Job summary
      # ─────────────────────────────────────────
      - name: Write job summary
        if: success()
        run: |
          APK="$PROJECT/android/app/build/outputs/apk/debug/app-debug.apk"
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "## 🎵 Aura v25 — Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK size | \`$SIZE\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build type | Debug |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Download:** Actions tab → this run → Artifacts → **Aura-v25-debug**" >> $GITHUB_STEP_SUMMARY
          echo "> Extract zip → tap APK → enable *Install unknown apps* if prompted" >> $GITHUB_STEP_SUMMARY
