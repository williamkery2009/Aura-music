name: Aura — Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # No quotes — quoted values embed literal " chars into the env var,
      # which the JVM then tries to load as a class name.
      JAVA_TOOL_OPTIONS: -Xmx3072m -XX:MaxMetaspaceSize=512m
      GRADLE_OPTS: -Xmx3072m -XX:MaxMetaspaceSize=512m

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Toolchain
      # ─────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      # ─────────────────────────────────────────
      # 3. Locate project
      # ─────────────────────────────────────────
      - name: Locate project directory
        run: |
          if [ -d "aura-android" ]; then
            echo "PROJECT=$GITHUB_WORKSPACE/aura-android" >> $GITHUB_ENV
          else
            unzip -q -o aura-android-v25.zip -d _extracted
            DIR=$(find _extracted -maxdepth 2 -name "package.json" | head -1 | xargs dirname)
            echo "PROJECT=$(realpath $DIR)" >> $GITHUB_ENV
          fi

      - name: Confirm project structure
        run: ls "$PROJECT"

      # ─────────────────────────────────────────
      # 4. Strip broken/unavailable packages
      #    and pin working versions
      # ─────────────────────────────────────────
      - name: Patch package.json
        run: |
          node -e "
            const fs = require('fs');
            const p = '$PROJECT/package.json';
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            const keep = {
              '@capacitor/android':             '6.0.0',
              '@capacitor/core':                '6.0.0',
              '@capacitor/cli':                 '6.0.0',
              '@capacitor/haptics':             '6.0.0',
              '@capacitor/status-bar':          '6.0.0',
              '@capacitor/splash-screen':       '6.0.0',
              '@capacitor/filesystem':          '6.0.0',
              '@capacitor/preferences':         '6.0.0',
              '@capacitor/local-notifications': '6.0.0',
            };
            pkg.dependencies = keep;
            pkg.devDependencies = { '@capacitor/cli': '6.0.0', 'typescript': 'latest' };
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2));
            console.log('package.json patched');
          "

      # ─────────────────────────────────────────
      # 5. Install dependencies
      # ─────────────────────────────────────────
      - name: Install npm dependencies
        working-directory: ${{ env.PROJECT }}
        run: npm install --no-audit --no-fund

      # ─────────────────────────────────────────
      # 6. Patch Gradle files
      # ─────────────────────────────────────────
      - name: Patch android/settings.gradle
        run: |
          SETTINGS="$PROJECT/android/settings.gradle"
          sed -i "/capacitor-background-mode/d" "$SETTINGS"
          sed -i "/capacitor-media/d" "$SETTINGS"
          echo "settings.gradle patched"
          cat "$SETTINGS"

      - name: Patch android/app/build.gradle
        run: |
          BUILDGRADLE="$PROJECT/android/app/build.gradle"
          sed -i "/capacitor-background-mode/d" "$BUILDGRADLE"
          sed -i "/capacitor-media/d" "$BUILDGRADLE"
          echo "app/build.gradle patched"

      - name: Nuke bad JVM args from ALL gradle.properties
        run: |
          find "$PROJECT" -name "gradle.properties" | while read f; do
            echo "Patching: $f"
            sed -i "/org.gradle.jvmargs/d" "$f"
            echo 'org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=512m' >> "$f"
            cat "$f"
          done

      - name: Patch gradlew — strip bad DEFAULT_JVM_OPTS values
        run: |
          GRADLEW="$PROJECT/android/gradlew"
          chmod +x "$GRADLEW"
          echo "=== DEFAULT_JVM_OPTS before patch ==="
          grep -n 'DEFAULT_JVM_OPTS' "$GRADLEW" || true
          # Replace the whole DEFAULT_JVM_OPTS assignment with a safe empty value.
          # JAVA_TOOL_OPTIONS (set at job level) already supplies the correct heap.
          # Leaving a broken/quoted value here causes ClassNotFoundException.
          sed -i 's/^DEFAULT_JVM_OPTS=.*/DEFAULT_JVM_OPTS=""/' "$GRADLEW"
          echo "=== DEFAULT_JVM_OPTS after patch ==="
          grep -n 'DEFAULT_JVM_OPTS' "$GRADLEW" || true

      # ─────────────────────────────────────────
      # 7. Configure Android SDK path
      # ─────────────────────────────────────────
      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > "$PROJECT/android/local.properties"

      # ─────────────────────────────────────────
      # 8. Build web layer
      # ─────────────────────────────────────────
      - name: Inject native bridge into index.html
        working-directory: ${{ env.PROJECT }}
        run: node scripts/build.js

      - name: Capacitor sync to Android
        working-directory: ${{ env.PROJECT }}
        run: npx cap sync android --inline

      # ─────────────────────────────────────────
      # 9. Gradle cache
      # ─────────────────────────────────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ─────────────────────────────────────────
      # 10. Build APK
      # ─────────────────────────────────────────
      - name: Build debug APK
        working-directory: ${{ env.PROJECT }}/android
        run: ./gradlew assembleDebug --no-daemon --parallel --build-cache

      # ─────────────────────────────────────────
      # 11. Upload artifact
      # ─────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aura-v25-debug
          path: ${{ env.PROJECT }}/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      # ─────────────────────────────────────────
      # 12. Job summary
      # ─────────────────────────────────────────
      - name: Write job summary
        if: success()
        run: |
          APK="$PROJECT/android/app/build/outputs/apk/debug/app-debug.apk"
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "## 🎵 Aura v25 — Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK size | \`$SIZE\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build type | Debug |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Download:** Actions tab → this run → Artifacts → **Aura-v25-debug**" >> $GITHUB_STEP_SUMMARY
          echo "> Extract zip → tap APK → enable *Install unknown apps* if prompted" >> $GITHUB_STEP_SUMMARY
